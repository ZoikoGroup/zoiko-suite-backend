apiVersion: v1
kind: Service
metadata:
  name: identity-svc
  namespace: zoiko-identity
  labels:
    app: identity-svc
spec:
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  selector:
    app: identity-svc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-svc
  namespace: zoiko-identity
  labels:
    app: identity-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-svc
  template:
    metadata:
      labels:
        app: identity-svc
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
      - name: identity-svc
        image: identity-svc:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        env:
        - name: PORT
          value: "8080"
        - name: DB_HOST
          value: "postgres.zoiko-infra.svc.cluster.local"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "identity_context"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          value: "postgres"
        - name: DB_SSLMODE
          value: "disable"
        - name: REDIS_HOST
          value: "redis.zoiko-infra.svc.cluster.local"
        - name: REDIS_PORT
          value: "6379"
        - name: KAFKA_BROKERS
          value: "kafka.zoiko-infra.svc.cluster.local:9092"
        - name: KAFKA_GROUP_ID
          value: "identity-context-svc"
        - name: KAFKA_EVENTS_TOPIC
          value: "zoiko.identity.events"
        - name: JWT_SIGNING_SECRET
          value: "local-dev-jwt-signing-secret-key-32-chars-long"
        - name: TENANT_REGISTRY_URL
          value: "http://tenant-svc.zoiko-identity.svc.cluster.local:8081"
        - name: DELEGATED_AUTHORITY_URL
          value: "http://identity-svc.zoiko-identity.svc.cluster.local:8080"
        - name: ACCESS_CONTROL_URL
          value: "http://identity-svc.zoiko-identity.svc.cluster.local:8080"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
