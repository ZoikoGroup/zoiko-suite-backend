apiVersion: v1
kind: Service
metadata:
  name: workflow-svc
  namespace: zoiko-governance
  labels:
    app: workflow-svc
spec:
  ports:
  - port: 8090
    targetPort: 8090
    name: http
  selector:
    app: workflow-svc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-svc
  namespace: zoiko-governance
  labels:
    app: workflow-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workflow-svc
  template:
    metadata:
      labels:
        app: workflow-svc
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
      - name: workflow-svc
        image: workflow-svc:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8090
          name: http
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        env:
        - name: PORT
          value: "8090"
        - name: DB_HOST
          value: "postgres.zoiko-infra.svc.cluster.local"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "workflow"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          value: "postgres"
        - name: DB_SSLMODE
          value: "disable"
        - name: KAFKA_BROKERS
          value: "kafka.zoiko-infra.svc.cluster.local:9092"
        - name: KAFKA_GROUP_ID
          value: "workflow-svc"
        - name: KAFKA_EVENTS_TOPIC
          value: "zoiko.workflow.events"
        - name: AUTHORIZATION_SERVICE_URL
          value: "http://authorization-svc.zoiko-governance.svc.cluster.local:8089"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8090
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8090
          initialDelaySeconds: 15
          periodSeconds: 10
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
