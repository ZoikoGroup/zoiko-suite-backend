apiVersion: v1
kind: Service
metadata:
  name: jurisdiction-svc
  namespace: zoiko-governance
  labels:
    app: jurisdiction-svc
spec:
  ports:
  - port: 8082
    targetPort: 8082
    name: http
  selector:
    app: jurisdiction-svc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jurisdiction-svc
  namespace: zoiko-governance
  labels:
    app: jurisdiction-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jurisdiction-svc
  template:
    metadata:
      labels:
        app: jurisdiction-svc
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
      - name: jurisdiction-svc
        image: jurisdiction-svc:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8082
          name: http
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        env:
        - name: PORT
          value: "8082"
        - name: DB_HOST
          value: "postgres.zoiko-infra.svc.cluster.local"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "jurisdiction_rules"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          value: "postgres"
        - name: DB_SSLMODE
          value: "disable"
        - name: AUTHZ_SERVICE_URL
          value: "http://jurisdiction-svc.zoiko-governance.svc.cluster.local:8082"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8082
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8082
          initialDelaySeconds: 15
          periodSeconds: 10
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
