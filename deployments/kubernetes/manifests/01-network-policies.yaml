      port: 5432
  # Allow egress to authorization-svc in same namespace (schema publish is
  # gated through it, fail-closed)
  - to:
    - podSelector:
        matchLabels:
          app: authorization-svc
    ports:
    - protocol: TCP
      port: 8089
  # Allow CoreDNS access
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
