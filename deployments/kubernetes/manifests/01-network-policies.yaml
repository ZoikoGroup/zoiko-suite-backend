# ── obligations-svc (zoiko-governance) ────────────────────────────────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: obligations-svc-policy
  namespace: zoiko-governance
spec:
  podSelector:
    matchLabels:
      app: obligations-svc
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 8088
  egress:
  # Allow egress to Postgres and Kafka in zoiko-infra
  - to:
    - namespaceSelector:
        matchLabels:
          name: zoiko-infra
    ports:
    - protocol: TCP
      port: 5432
    - protocol: TCP
      port: 9092
  # Allow egress to jurisdiction-svc in same namespace (obligation creation
  # calls it synchronously to validate jurisdiction_id — fail-open would
  # violate the constraint that every obligation must be jurisdiction-bound)
  - to:
    - podSelector:
        matchLabels:
          app: jurisdiction-svc
    ports:
    - protocol: TCP
      port: 8082
  # Allow CoreDNS access
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53

# ── gateway-auth-svc (zoiko-identity) ─────────────────────────────────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gateway-auth-svc-policy
  namespace: zoiko-identity
spec:
  podSelector:
    matchLabels:
      app: gateway-auth-svc
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # ForwardAuth is called by the API gateway (any namespace) on every gated request
  - from:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 8092
  egress:
  # Allow egress to identity-svc in same namespace to fetch JWKS
  - to:
    - podSelector:
        matchLabels:
          app: identity-svc
    ports:
    - protocol: TCP
      port: 8080
  # Allow CoreDNS access
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53

# ── schema-registry-svc (zoiko-governance) ────────────────────────────────────
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: schema-registry-svc-policy
  namespace: zoiko-governance
spec:
  podSelector:
    matchLabels:
      app: schema-registry-svc
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 8093
  egress:
