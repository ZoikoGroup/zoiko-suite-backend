apiVersion: v1
kind: Service
metadata:
  name: schema-registry-svc
  namespace: zoiko-governance
  labels:
    app: schema-registry-svc
spec:
  ports:
  - port: 8093
    targetPort: 8093
    name: http
  selector:
    app: schema-registry-svc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: schema-registry-svc
  namespace: zoiko-governance
  labels:
    app: schema-registry-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: schema-registry-svc
  template:
    metadata:
      labels:
        app: schema-registry-svc
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
      - name: schema-registry-svc
        image: schema-registry-svc:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8093
          name: http
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        env:
        - name: PORT
          value: "8093"
        - name: DB_HOST
          value: "postgres.zoiko-infra.svc.cluster.local"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "schema_registry"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          value: "postgres"
        - name: DB_SSLMODE
          value: "disable"
        # Schema publish is gated through authorization-svc (fail-closed).
        # Config default is "http://authorization-svc:8089" — compose short name,
        # NXDOMAIN in K8s. Override with full cluster DNS name.
        - name: AUTHORIZATION_SERVICE_URL
          value: "http://authorization-svc.zoiko-governance.svc.cluster.local:8089"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8093
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8093
          initialDelaySeconds: 15
          periodSeconds: 10
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
