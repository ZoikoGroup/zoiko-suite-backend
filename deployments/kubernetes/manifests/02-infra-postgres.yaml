apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: zoiko-infra
  labels:
    app: postgres
spec:
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: zoiko-infra
  labels:
    app: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      securityContext:
        fsGroup: 70
      containers:
      - name: postgres
        image: postgres:16-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          value: postgres
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          value: postgres
        securityContext:
          runAsUser: 70
          runAsGroup: 70
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        - name: init-script
          mountPath: /docker-entrypoint-initdb.d
        - name: audit-migrations
          mountPath: /migrations/audit-event-store
        - name: identity-migrations
          mountPath: /migrations/identity-context
        - name: tenant-migrations
          mountPath: /migrations/tenant-entity-registry
        - name: jurisdiction-migrations
          mountPath: /migrations/jurisdiction-rules
        - name: governance-migrations
          mountPath: /migrations/governance-decision-log
        - name: policy-migrations
          mountPath: /migrations/policy
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "postgres", "-d", "postgres"]
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "postgres", "-d", "postgres"]
          initialDelaySeconds: 15
          periodSeconds: 10
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "256Mi"
      volumes:
      - name: init-script
        configMap:
          name: postgres-init-script
          defaultMode: 0755
      - name: audit-migrations
        configMap:
          name: audit-migrations
      - name: identity-migrations
        configMap:
          name: identity-migrations
      - name: tenant-migrations
        configMap:
          name: tenant-migrations
      - name: jurisdiction-migrations
        configMap:
          name: jurisdiction-migrations
      - name: governance-migrations
        configMap:
          name: governance-migrations
      - name: policy-migrations
        configMap:
          name: policy-migrations
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
