apiVersion: v1
kind: Service
metadata:
  name: intercompany-accounting-svc
  namespace: zoiko-finance
  labels:
    app: intercompany-accounting-svc
spec:
  ports:
  - port: 8104
    targetPort: 8104
    name: http
  selector:
    app: intercompany-accounting-svc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: intercompany-accounting-svc
  namespace: zoiko-finance
  labels:
    app: intercompany-accounting-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: intercompany-accounting-svc
  template:
    metadata:
      labels:
        app: intercompany-accounting-svc
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
      - name: intercompany-accounting-svc
        image: intercompany-accounting-svc:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8104
          name: http
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        env:
        - name: PORT
          value: "8104"
        - name: DB_HOST
          value: "postgres.zoiko-infra.svc.cluster.local"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "intercompany_accounting"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          value: "postgres"
        - name: DB_SSLMODE
          value: "disable"
        - name: KAFKA_BROKERS
          value: "kafka.zoiko-infra.svc.cluster.local:9092"
        - name: KAFKA_GROUP_ID
          value: "intercompany-accounting-svc"
        - name: KAFKA_EVENTS_TOPIC
          value: "zoiko.intercompany-accounting.events"
        # In-cluster DNS name for authorization-svc.
        # Config default is "http://authorization-svc:8089" which is the compose
        # short name and would NXDOMAIN inside K8s — override explicitly here.
        - name: AUTHZ_SERVICE_URL
          value: "http://authorization-svc.zoiko-governance.svc.cluster.local:8089"
        # general-ledger-svc lives in this same namespace (zoiko-finance), so
        # the short in-namespace DNS name resolves without qualification.
        - name: LEDGER_SERVICE_URL
          value: "http://general-ledger-svc:8098"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector.zoiko-infra.svc.cluster.local:4318"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8104
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8104
          initialDelaySeconds: 15
          periodSeconds: 10
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
