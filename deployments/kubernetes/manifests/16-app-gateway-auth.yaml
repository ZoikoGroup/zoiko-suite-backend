apiVersion: v1
kind: Service
metadata:
  name: gateway-auth-svc
  namespace: zoiko-identity
  labels:
    app: gateway-auth-svc
spec:
  ports:
  - port: 8092
    targetPort: 8092
    name: http
  selector:
    app: gateway-auth-svc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-auth-svc
  namespace: zoiko-identity
  labels:
    app: gateway-auth-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-auth-svc
  template:
    metadata:
      labels:
        app: gateway-auth-svc
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
      - name: gateway-auth-svc
        image: gateway-auth-svc:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8092
          name: http
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        env:
        - name: PORT
          value: "8092"
        # In-cluster DNS name for identity-svc JWKS endpoint.
        # Config default is "http://identity-svc:8080/..." (compose short name);
        # must be the full cluster DNS name here.
        - name: IDENTITY_JWKS_URL
          value: "http://identity-svc.zoiko-identity.svc.cluster.local:8080/.well-known/jwks.json"
        - name: EXPECTED_ISSUER
          value: "identity-context-svc"
        - name: EXPECTED_AUDIENCE
          value: "zoiko-internal"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8092
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8092
          initialDelaySeconds: 15
          periodSeconds: 10
        resources:
          limits:
            cpu: "200m"
            memory: "128Mi"
          requests:
            cpu: "50m"
            memory: "64Mi"
