apiVersion: v1
kind: Service
metadata:
  name: accounts-receivable-svc
  namespace: zoiko-finance
  labels:
    app: accounts-receivable-svc
spec:
  ports:
  - port: 8100
    targetPort: 8100
    name: http
  selector:
    app: accounts-receivable-svc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: accounts-receivable-svc
  namespace: zoiko-finance
  labels:
    app: accounts-receivable-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: accounts-receivable-svc
  template:
    metadata:
      labels:
        app: accounts-receivable-svc
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
      - name: accounts-receivable-svc
        image: accounts-receivable-svc:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8100
          name: http
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        env:
        - name: PORT
          value: "8100"
        - name: DB_HOST
          value: "postgres.zoiko-infra.svc.cluster.local"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "accounts_receivable"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          value: "postgres"
        - name: DB_SSLMODE
          value: "disable"
        - name: KAFKA_BROKERS
          value: "kafka.zoiko-infra.svc.cluster.local:9092"
        - name: KAFKA_GROUP_ID
          value: "accounts-receivable-svc"
        - name: KAFKA_EVENTS_TOPIC
          value: "zoiko.accounts-receivable.events"
        - name: AUTHZ_SERVICE_URL
          value: "http://authorization-svc.zoiko-governance.svc.cluster.local:8089"
        - name: LEDGER_SERVICE_URL
          value: "http://general-ledger-svc.zoiko-finance.svc.cluster.local:8098"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector.zoiko-infra.svc.cluster.local:4318"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8100
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8100
          initialDelaySeconds: 15
          periodSeconds: 10
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
