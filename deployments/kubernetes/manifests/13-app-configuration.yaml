apiVersion: v1
kind: Service
metadata:
  name: configuration-svc
  namespace: zoiko-governance
  labels:
    app: configuration-svc
spec:
  ports:
  - port: 8086
    targetPort: 8086
    name: http
  selector:
    app: configuration-svc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: configuration-svc
  namespace: zoiko-governance
  labels:
    app: configuration-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: configuration-svc
  template:
    metadata:
      labels:
        app: configuration-svc
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
      - name: configuration-svc
        image: configuration-svc:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8086
          name: http
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        env:
        - name: PORT
          value: "8086"
        - name: DB_HOST
          value: "postgres.zoiko-infra.svc.cluster.local"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "configuration_feature_flag"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          value: "postgres"
        - name: DB_SSLMODE
          value: "disable"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector.zoiko-infra.svc.cluster.local:4318"
        # No liveness/readiness httpGet: this service's Dockerfile has no
        # healthcheck binary (pre-existing gap mirrored from docker-compose.yml).
        # Use a TCP socket probe so the pod can still reach Ready.
        livenessProbe:
          tcpSocket:
            port: 8086
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 8086
          initialDelaySeconds: 15
          periodSeconds: 10
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
