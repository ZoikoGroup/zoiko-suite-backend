###############################################################################
# 36-app-tax-authority-interface.yaml
# Phase 7 — Tax Authority Interface Service  (port 8147)
###############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tax-authority-interface-svc
  namespace: zoiko-extensions
  labels:
    app: tax-authority-interface-svc
    phase: "7"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tax-authority-interface-svc
  template:
    metadata:
      labels:
        app: tax-authority-interface-svc
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
      containers:
        - name: tax-authority-interface-svc
          image: zoiko/tax-authority-interface-svc:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8147
          env:
            - name: PORT
              value: "8147"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tax-authority-interface-db-secret
                  key: url
            - name: KAFKA_BROKERS
              value: "kafka:9092"
            - name: KAFKA_EVENTS_TOPIC
              value: "zoiko.tax.authority.interface.events"
            - name: AUTHZ_SERVICE_URL
              value: "http://authorization-svc.zoiko-governance:8081"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8147
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8147
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: tax-authority-interface-svc
  namespace: zoiko-extensions
spec:
  selector:
    app: tax-authority-interface-svc
  ports:
    - protocol: TCP
      port: 8147
      targetPort: 8147
