apiVersion: v1
kind: Service
metadata:
  name: secret-vault-svc
  namespace: zoiko-governance
  labels:
    app: secret-vault-svc
spec:
  ports:
  - port: 8087
    targetPort: 8087
    name: http
  selector:
    app: secret-vault-svc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secret-vault-svc
  namespace: zoiko-governance
  labels:
    app: secret-vault-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secret-vault-svc
  template:
    metadata:
      labels:
        app: secret-vault-svc
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
      containers:
      - name: secret-vault-svc
        image: secret-vault-svc:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8087
          name: http
        securityContext:
          allowPrivilegeEscalation: false
          # readOnlyRootFilesystem is intentionally false: the LocalFileVaultBackend
          # writes encrypted secret material to VAULT_LOCAL_STORE_PATH (/tmp/...).
          # Production replaces this with HashiCorp Vault / cloud KMS (see context.md §7.6).
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        env:
        - name: PORT
          value: "8087"
        - name: DB_HOST
          value: "postgres.zoiko-infra.svc.cluster.local"
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: "secret_vault_integration"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          value: "postgres"
        - name: DB_SSLMODE
          value: "disable"
        # Throwaway local-dev AES-256 master key — same posture as identity-svc's
        # envelope signing key. Must be replaced by Secrets Manager in production.
        - name: VAULT_MASTER_KEY_HEX
          value: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
        - name: VAULT_LOCAL_STORE_PATH
          value: "/tmp/secret_store.local"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector.zoiko-infra.svc.cluster.local:4318"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8087
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8087
          initialDelaySeconds: 15
          periodSeconds: 10
        resources:
          limits:
            cpu: "500m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
