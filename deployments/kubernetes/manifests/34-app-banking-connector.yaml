###############################################################################
# 34-app-banking-connector.yaml
# Phase 7 — Banking Connector Service  (port 8145)
###############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-connector-svc
  namespace: zoiko-extensions
  labels:
    app: banking-connector-svc
    phase: "7"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: banking-connector-svc
  template:
    metadata:
      labels:
        app: banking-connector-svc
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
      containers:
        - name: banking-connector-svc
          image: zoiko/banking-connector-svc:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8145
          env:
            - name: PORT
              value: "8145"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: banking-connector-db-secret
                  key: url
            - name: KAFKA_BROKERS
              value: "kafka:9092"
            - name: KAFKA_EVENTS_TOPIC
              value: "zoiko.banking.connector.events"
            - name: AUTHZ_SERVICE_URL
              value: "http://authorization-svc.zoiko-governance:8081"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8145
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8145
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: banking-connector-svc
  namespace: zoiko-extensions
spec:
  selector:
    app: banking-connector-svc
  ports:
    - protocol: TCP
      port: 8145
      targetPort: 8145
