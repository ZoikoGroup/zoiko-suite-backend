worker_processes 1;
# The docker.sock is owned root:root with no world access. nginx's image
# defaults to running worker processes as an unprivileged "nginx" user,
# which gets a plain permission denied connecting to the socket — override
# to root so the worker that actually proxies requests can reach it.
user root;
events { worker_connections 128; }

http {
    # Traefik's bundled Docker client is hardcoded to send its initial
    # handshake as GET /v1.24/version, regardless of DOCKER_API_VERSION or
    # image version — confirmed empirically (see deployments/docker-compose.yml
    # comments). This engine enforces MinAPIVersion 1.40 and rejects v1.24
    # outright with an empty-body 400, which Docker's own SDK then surfaces
    # as an unhelpfully blank "Error response from daemon: ".
    #
    # Fix: strip ANY /vX.YY/ version prefix before forwarding to the real
    # socket. Unversioned requests are always accepted by the daemon using
    # its latest supported version — this is exactly what a plain
    # `curl --unix-socket /var/run/docker.sock http://localhost/version`
    # does successfully.
    upstream docker_socket {
        server unix:/var/run/docker.sock;
    }

    server {
        listen 2375;

        # Read-only, containers-only allowlist — Traefik's Docker provider
        # only ever needs to list/inspect containers and do its version
        # handshake. Anything else (POST, images, volumes, exec, etc.) is
        # deliberately rejected so a compromised gateway can't use this
        # socket access for anything beyond service discovery.
        location ~ ^/(v[0-9]+\.[0-9]+/)?version$ {
            rewrite ^/v[0-9]+\.[0-9]+/(.*)$ /$1 break;
            proxy_pass http://docker_socket;
        }
        location ~ ^/(v[0-9]+\.[0-9]+/)?_ping$ {
            rewrite ^/v[0-9]+\.[0-9]+/(.*)$ /$1 break;
            proxy_pass http://docker_socket;
        }
        location ~ ^/(v[0-9]+\.[0-9]+/)?containers(/.*)?$ {
            limit_except GET {
                deny all;
            }
            rewrite ^/v[0-9]+\.[0-9]+/(.*)$ /$1 break;
            proxy_pass http://docker_socket;
        }
        location ~ ^/(v[0-9]+\.[0-9]+/)?events$ {
            rewrite ^/v[0-9]+\.[0-9]+/(.*)$ /$1 break;
            proxy_pass http://docker_socket;
        }

        location / {
            return 403;
        }
    }
}
