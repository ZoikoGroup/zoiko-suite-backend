version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres-p6
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./init-db-phase6.sh:/docker-entrypoint-initdb.d/init-db-phase6.sh:ro
      - ../services/anomaly-detection-svc/deployments/migrations:/migrations/anomaly-detection:ro
      - postgres_p6_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper-p6
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-p6
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9092"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  authorization-svc:
    build:
      context: ../services/authorization-svc
      dockerfile: Dockerfile
    container_name: authorization-svc-p6
    ports:
      - "8089:8089"
    environment:
      PORT: "8089"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/authorization?sslmode=disable
      KAFKA_BROKERS: kafka:9092
    restart: on-failure
    healthcheck:
      test: ["CMD", "/app/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── 01. Anomaly Detection Service ─────────────────────────────────────────
  anomaly-detection-svc:
    build:
      context: ../services/anomaly-detection-svc
      dockerfile: Dockerfile
    container_name: anomaly-detection-svc-p6
    ports:
      - "8134:8134"
    environment:
      PORT: "8134"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/anomaly_detection?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      KAFKA_EVENTS_TOPIC: zoiko.anomaly-detection.events
      AUTHZ_SERVICE_URL: http://authorization-svc:8089
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      authorization-svc:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD", "/app/healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_p6_data:
