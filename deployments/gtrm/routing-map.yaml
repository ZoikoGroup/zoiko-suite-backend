# GTRM Routing Map — the single authored representation of routing policy.
#
# Per the approved Phase 1 decision (docs/architecture/
# global-traffic-residency-manager-decision.md §4.1), this is the ONLY place
# routing policy is authored. It is compiled into Traefik config by the
# compiler (deployments/gtrm/compiler); Traefik config is never hand-edited.
#
# In production this map is generated from tenant records (the source of
# truth). For Phase 1 it is file-based, as the decision explicitly allows.
schema_version: 1
map_version: 47            # monotonically increasing; stamped into compiled output + logs
env: dev                   # dev | staging | prod — compiler rejects prod generation from a dev map
env_domain: zoikosuite.dev.internal   # {tenant_slug}.{env_domain} is the routing key

tenants:
  - tenant_id: tenant_acme_eu
    tenant_slug: acme
    workspace_id: workspace_acme_primary
    data_residency_policy_id: residency_eu_001
    policy_version: 12
    allowed_regions: [eu]          # closed set; primary/fallback must be within this
    primary_region: eu
    fallback_region: null          # null = no failover service emitted
    quarantine_mode: BLOCK         # NONE | BLOCK | ISOLATED_SERVE
    quarantine_pool: null          # required + region-compatible only for ISOLATED_SERVE
    routing_status: ACTIVE         # ACTIVE | SUSPENDED | PENDING_RESOLUTION
    last_updated_at: 2026-07-10T12:00:00Z
    updated_by: platform-governance
    change_reference: GTRM-47

  - tenant_id: tenant_atlas_multi
    tenant_slug: atlas
    workspace_id: workspace_atlas_primary
    data_residency_policy_id: residency_multi_002
    policy_version: 6
    allowed_regions: [eu, uk]
    primary_region: eu
    fallback_region: uk            # approved fallback within allowed_regions
    failover_active: false         # manual switch: operator sets true during an
                                   # EU outage -> routes to uk; STICKY (stays on
                                   # uk after EU recovers until set back to false)
    quarantine_mode: BLOCK
    quarantine_pool: null
    routing_status: ACTIVE
    last_updated_at: 2026-07-10T12:05:00Z
    updated_by: platform-governance
    change_reference: GTRM-48

  # US-residency tenant — proves acceptance test B (US tenant routes to us-pool).
  - tenant_id: tenant_globex_us
    tenant_slug: globex
    workspace_id: workspace_globex_primary
    data_residency_policy_id: residency_us_003
    policy_version: 3
    allowed_regions: [us]
    primary_region: us
    fallback_region: null
    quarantine_mode: BLOCK
    quarantine_pool: null
    routing_status: ACTIVE
    last_updated_at: 2026-07-10T12:10:00Z
    updated_by: platform-governance
    change_reference: GTRM-49

  # Onboarding tenant whose residency policy is not yet resolved — proves
  # acceptance test C (fail-closed). PENDING_RESOLUTION => no data-bearing
  # route is emitted, so its traffic falls through to the safe catch-all.
  - tenant_id: tenant_newco_pending
    tenant_slug: newco
    workspace_id: null
    data_residency_policy_id: null
    policy_version: 0
    allowed_regions: []
    primary_region: null
    fallback_region: null
    quarantine_mode: NONE
    quarantine_pool: null
    routing_status: PENDING_RESOLUTION
    last_updated_at: 2026-07-10T12:15:00Z
    updated_by: platform-governance
    change_reference: GTRM-50
