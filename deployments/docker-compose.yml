        condition: service_healthy
      kafka:
        condition: service_healthy
      governance-svc:
        condition: service_healthy
      authorization-svc:
        condition: service_healthy
      workflow-svc:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/healthcheck", "http://localhost:8095/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: on-failure

