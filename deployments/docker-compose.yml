version: '3.8'

services:

  # ── Shared PostgreSQL ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: zoiko-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      # Mount the database initialization script and all migrations
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
      - ../services/audit-event-store-svc/deployments/migrations:/migrations/audit-event-store:ro
      - ../services/identity-context-svc/deployments/migrations:/migrations/identity-context:ro
      - ../services/tenant-entity-registry-svc/deployments/migrations:/migrations/tenant-entity-registry:ro
      - ../services/jurisdiction-rules-svc/deployments/migrations:/migrations/jurisdiction-rules:ro
      - ../services/governance-decision-log-svc/deployments/migrations:/migrations/governance-decision-log:ro
      - ../services/policy-svc/deployments/migrations:/migrations/policy:ro
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ── Shared Redis (identity-context-svc cache) ────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: zoiko-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Shared Kafka (apache/kafka:latest KRaft mode) ────────────────────────────
  kafka:
    image: apache/kafka:latest
    container_name: zoiko-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENERS: "PLAINTEXT://:9094,EXTERNAL://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9094,EXTERNAL://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: "1"
      KAFKA_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      CLUSTER_ID: "zoiko-suite-local-dev-kraft"
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 15s

  # ── One-shot: generate a throwaway RSA keypair for local/dev envelope signing ──
  # Never used in staging/production — there, a real key is injected via the
  # secrets manager. This exists only so `docker compose up` works out of the box
  # without hand-generating a key or (far worse) baking a real one into the image.
  identity-svc-keygen:
    image: alpine:3.19
    container_name: identity-svc-keygen
    volumes:
      - identity_jwt_keys:/keys
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        apk add --no-cache openssl >/dev/null
        if [ ! -f /keys/envelope_signing_key.pem ]; then
          openssl genrsa -out /keys/envelope_signing_key.pem 2048
          echo "Generated throwaway dev signing key"
        else
          echo "Dev signing key already present, skipping"
        fi
        # identity-svc's runtime image runs as an unprivileged nonroot user
        # (distroless), which needs read access to this file.
        chmod 644 /keys/envelope_signing_key.pem
    restart: "no"

  # ── 1. identity-context-svc (Port: 8080) ─────────────────────────────────────
  identity-svc:
    build:
      context: ../services/identity-context-svc
      dockerfile: Dockerfile
    container_name: identity-context-svc
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: identity_context
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSLMODE: disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BROKERS: "kafka:9094"
      KAFKA_GROUP_ID: "identity-context-svc"
      KAFKA_EVENTS_TOPIC: "zoiko.identity.events"
      JWT_SIGNING_SECRET: "local-dev-jwt-signing-secret-key-32-chars-long"
      JWT_SIGNING_PRIVATE_KEY_PATH: "/keys/envelope_signing_key.pem"
      JWT_KEY_ID: "local-dev-key-1"
      TENANT_REGISTRY_URL: "http://tenant-svc:8081"
      DELEGATED_AUTHORITY_URL: "http://identity-svc:8080"
      ACCESS_CONTROL_URL: "http://identity-svc:8080"
    volumes:
      - identity_jwt_keys:/keys:ro
    depends_on:
      identity-svc-keygen:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/healthcheck", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: on-failure

  # ── 2. tenant-entity-registry-svc (Port: 8081) ────────────────────────────────
  tenant-svc:
    build:
      context: ../services/tenant-entity-registry-svc
      dockerfile: Dockerfile
    container_name: tenant-entity-registry-svc
    ports:
      - "8081:8081"
    environment:
      PORT: "8081"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: tenant_entity_registry
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSLMODE: disable
      KAFKA_BROKERS: "kafka:9094"
      KAFKA_GROUP_ID: "tenant-entity-registry-svc"
      KAFKA_EVENTS_TOPIC: "zoiko.entity.events"
      JURISDICTION_RULES_URL: "http://jurisdiction-svc:8082"
      AUTHZ_SERVICE_URL: "http://tenant-svc:8081" # mock stub authz points back
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/healthcheck", "http://localhost:8081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: on-failure

  # ── 3. jurisdiction-rules-svc (Port: 8082) ──────────────────────────────────
  jurisdiction-svc:
    build:
      context: ../services/jurisdiction-rules-svc
      dockerfile: Dockerfile
    container_name: jurisdiction-rules-svc
    ports:
      - "8082:8082"
    environment:
      PORT: "8082"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: jurisdiction_rules
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSLMODE: disable
      AUTHZ_SERVICE_URL: "http://jurisdiction-svc:8082" # mock stub authz points back
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/healthcheck", "http://localhost:8082/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: on-failure

  # ── 4. governance-decision-log-svc (Port: 8083) ──────────────────────────────
  governance-svc:
    build:
      context: ../services/governance-decision-log-svc
      dockerfile: Dockerfile
    container_name: governance-decision-log-svc
    ports:
      - "8083:8083"
    environment:
      PORT: "8083"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: governance_decision_log
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSLMODE: disable
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/healthcheck", "http://localhost:8083/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: on-failure

  # ── 5. audit-event-store-svc (Port: 8084) ─────────────────────────────────────
  audit-svc:
    build:
      context: ../services/audit-event-store-svc
      dockerfile: Dockerfile
    container_name: audit-event-store-svc
    ports:
      - "8084:8084"
    environment:
      PORT: "8084" # Remapped container port to 8084 to avoid conflict with identity-svc
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: audit_event_store
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSLMODE: disable
      KAFKA_BROKERS: "kafka:9094"
      KAFKA_GROUP_ID: "audit-event-store-svc"
      KAFKA_TOPICS: "zoiko.identity.events,zoiko.entity.events"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/healthcheck", "http://localhost:8084/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: on-failure

  # ── 6. policy-svc (Port: 8085) ────────────────────────────────────────────────
  policy-svc:
    build:
      context: ../services/policy-svc
      dockerfile: Dockerfile
    container_name: policy-svc
    ports:
      - "8085:8085"
    environment:
      PORT: "8085"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: policy
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSLMODE: disable
      GOVERNANCE_DECISION_LOG_SERVICE_URL: "http://governance-svc:8083"
      KAFKA_BROKERS: "kafka:9094"
      KAFKA_GROUP_ID: "policy-svc"
      KAFKA_EVENTS_TOPIC: "zoiko.policy.events"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/healthcheck", "http://localhost:8085/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: on-failure

  # ── 6. policy-svc (Port: 8085) ────────────────────────────────────────────────
  policy-svc:
    build:
      context: ../services/policy-svc
      dockerfile: Dockerfile
    container_name: policy-svc
    ports:
      - "8085:8085"
    environment:
      PORT: "8085"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: policy
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SSLMODE: disable
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8085/healthz | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: on-failure

volumes:
  postgres_data:
  identity_jwt_keys:
