      interval: 20s
      timeout: 5s
      retries: 3

  # ─── Tax Authority Interface (8147) ─────────────────────────────────────────
  tax-authority-interface-svc:
    build:
      context: ../services/tax-authority-interface-svc
      dockerfile: Dockerfile
    networks: [zoiko-p7]
