# Prometheus scrape config for the Observability Baseline retrofit.
# One static_configs block per instrumented service — added as each
# service is rolled out (docs/architecture/observability-baseline-plan.md).
# Static targets are the right default for a small, fixed set of known
# container names; revisit docker_sd_configs only if this becomes unwieldy.
global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/rules.yml

scrape_configs:
  - job_name: jurisdiction-rules-svc
    static_configs:
      - targets: ["jurisdiction-svc:8082"]
  - job_name: policy-svc
    static_configs:
      - targets: ["policy-svc:8085"]
  - job_name: authorization-svc
    static_configs:
      - targets: ["authorization-svc:8089"]
  - job_name: governance-decision-log-svc
    static_configs:
      - targets: ["governance-svc:8083"]
  - job_name: configuration-feature-flag-svc
    static_configs:
      - targets: ["configuration-feature-flag-svc:8086"]
  - job_name: secret-vault-integration-svc
    static_configs:
      - targets: ["secret-vault-integration-svc:8087"]
  - job_name: obligations-svc
    static_configs:
      - targets: ["obligations-svc:8088"]
  - job_name: workflow-svc
    static_configs:
      - targets: ["workflow-svc:8090"]
  - job_name: tenant-entity-registry-svc
    static_configs:
      - targets: ["tenant-svc:8081"]
  - job_name: audit-event-store-svc
    static_configs:
      - targets: ["audit-svc:8084"]
  - job_name: identity-context-svc
    static_configs:
      - targets: ["identity-svc:8080"]
