name: CI

on:
  push:
    branches: ["main", "feat/**", "fix/**", "chore/**"]
  pull_request:
    branches: ["main"]

defaults:
  run:
    shell: bash

jobs:
  # ─── Go services ─────────────────────────────────────────────────────────────
  go-services:
    name: "${{ matrix.service }} — build · vet · test"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_PASSWORD: secretpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    strategy:
      fail-fast: false          # show all failures, not just the first
      matrix:
        service:
          - audit-event-store-svc
          - identity-context-svc
          - tenant-entity-registry-svc
          - jurisdiction-rules-svc
          - governance-decision-log-svc
          - policy-svc
          - configuration-feature-flag-svc
          - obligations-svc
          - secret-vault-integration-svc
          - authorization-svc
          - workflow-svc
          - workflow-history-svc
          - gateway-auth-svc
          - schema-registry-svc
          - document-vault-svc
          - evidence-manifest-svc
          - search-client
          - search-indexer-svc
          - general-ledger-svc
          - accounts-payable-svc
          - accounts-receivable-svc
          - purchase-request-svc
          - treasury-svc
          - financial-close-svc
          - bank-reconciliation-svc
          - intercompany-accounting-svc
          - consolidation-svc
          - invoice-approval-svc
          - employee-master-svc
          - employment-contracts-svc
          - payroll-run-svc
          - compensation-svc
          - benefits-svc
          - payroll-tax-svc
          - payroll-exceptions-svc
          - leave-absence-svc
          - org-structure-svc
          - offboarding-severance-svc
          - workforce-compliance-svc
          # ── Phase 5 ────────────────────────────────────
          - contract-lifecycle-svc
          - clause-template-svc
          - obligation-tracking-svc
          - board-resolutions-svc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Read the Go version from the service's own go.mod so the matrix
          # is self-describing and we never silently test against the wrong toolchain.
          go-version-file: services/${{ matrix.service }}/go.mod
          cache-dependency-path: services/${{ matrix.service }}/go.sum

      # go.sum MUST exist in the repo and be current.
      # If it is missing or stale this step will fail — which is the
      # correct behavior: a missing go.sum means CI was not verifying
      # the module graph integrity.
      - name: Verify module graph (go mod verify)
        working-directory: services/${{ matrix.service }}
        run: go mod verify

      - name: Build
        working-directory: services/${{ matrix.service }}
        run: go build ./...

      - name: Vet
        working-directory: services/${{ matrix.service }}
        run: go vet ./...

      - name: Test (with race detector)
        working-directory: services/${{ matrix.service }}
        env:
          TEST_DATABASE_URL: ${{ (matrix.service == 'jurisdiction-rules-svc' || matrix.service == 'identity-context-svc' || matrix.service == 'governance-decision-log-svc' || matrix.service == 'tenant-entity-registry-svc' || matrix.service == 'policy-svc' || matrix.service == 'configuration-feature-flag-svc' || matrix.service == 'obligations-svc' || matrix.service == 'secret-vault-integration-svc' || matrix.service == 'authorization-svc' || matrix.service == 'workflow-svc' || matrix.service == 'schema-registry-svc' || matrix.service == 'document-vault-svc' || matrix.service == 'evidence-manifest-svc' || matrix.service == 'general-ledger-svc' || matrix.service == 'accounts-payable-svc' || matrix.service == 'accounts-receivable-svc' || matrix.service == 'purchase-request-svc' || matrix.service == 'treasury-svc' || matrix.service == 'financial-close-svc' || matrix.service == 'bank-reconciliation-svc' || matrix.service == 'intercompany-accounting-svc' || matrix.service == 'consolidation-svc' || matrix.service == 'invoice-approval-svc' || matrix.service == 'employee-master-svc' || matrix.service == 'employment-contracts-svc' || matrix.service == 'payroll-run-svc' || matrix.service == 'compensation-svc' || matrix.service == 'benefits-svc' || matrix.service == 'payroll-tax-svc' || matrix.service == 'payroll-exceptions-svc' || matrix.service == 'leave-absence-svc' || matrix.service == 'org-structure-svc' || matrix.service == 'offboarding-severance-svc' || matrix.service == 'workforce-compliance-svc' || matrix.service == 'contract-lifecycle-svc' || matrix.service == 'clause-template-svc' || matrix.service == 'obligation-tracking-svc' || matrix.service == 'board-resolutions-svc') && 'postgres://postgres:secretpassword@localhost:5432/testdb?sslmode=disable' || '' }}

        # go list ./... pre-enumerates packages, excluding the bare module
        # root which has no .go files (verified: this causes "no Go files
        # in root directory" only with `go test -list=...`, not with plain
        # ./... or with -race). Whether ./... alone has any failure mode on
        # the GitHub Actions Ubuntu runner under -race has not been directly
        # observed — this enumeration approach is used regardless because it
        # removes that ambiguity entirely rather than relying on ./...'s
        # implicit skip behavior.
        run: |
          pkgs=$(go list ./... 2>/dev/null | tr '\n' ' ')
          if [ -n "$pkgs" ]; then
            go test -race -v -count=1 -timeout=120s $pkgs
          else
            echo "No packages to test"
          fi

      - name: Integration test — health probes with embedded Postgres
        if: matrix.service == 'audit-event-store-svc' || matrix.service == 'workflow-history-svc'
        working-directory: services/${{ matrix.service }}
        # Uses embedded-postgres (downloads real Postgres binaries automatically).
        # No separate Postgres service container is needed.
        # Proves /healthz and /readyz return 200 against a real DB.
        run: go test -v -tags=integration -count=1 -timeout=120s ./cmd/server/

      - name: Integration test — store isolation/pipeline (PgStore → DB)
        if: matrix.service == 'workflow-history-svc' || matrix.service == 'tenant-entity-registry-svc' || matrix.service == 'accounts-receivable-svc' || matrix.service == 'purchase-request-svc' || matrix.service == 'treasury-svc' || matrix.service == 'financial-close-svc' || matrix.service == 'bank-reconciliation-svc' || matrix.service == 'intercompany-accounting-svc' || matrix.service == 'consolidation-svc' || matrix.service == 'invoice-approval-svc' || matrix.service == 'employee-master-svc' || matrix.service == 'employment-contracts-svc' || matrix.service == 'payroll-run-svc' || matrix.service == 'compensation-svc' || matrix.service == 'benefits-svc' || matrix.service == 'payroll-tax-svc' || matrix.service == 'payroll-exceptions-svc' || matrix.service == 'leave-absence-svc' || matrix.service == 'org-structure-svc' || matrix.service == 'offboarding-severance-svc' || matrix.service == 'workforce-compliance-svc'
        working-directory: services/${{ matrix.service }}
        # Runs integration tests under internal/store to verify isolation or the consumer pipeline.
        # Uses embedded-postgres (downloads real Postgres binaries automatically).
        run: go test -v -tags=integration -count=1 -timeout=120s ./internal/store/

